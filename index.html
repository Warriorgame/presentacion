<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentació - ReVesteix</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .presentacio {
      width: min(100%, 900px);
      height: auto;
      display: block;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.16);
      background: white;
    }
  </style>
</head>
<body>
  <svg class="presentacio" xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-label="Presentació de la dessuadora Urban Black de ReVesteix">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#efefef" />
        <stop offset="100%" stop-color="#dcdcdc" />
      </linearGradient>
      <radialGradient id="glow" cx="78%" cy="18%" r="30%">
        <stop offset="0%" stop-color="#a8c5a0" stop-opacity=".38" />
        <stop offset="100%" stop-color="#a8c5a0" stop-opacity="0" />
      </radialGradient>
      <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
        <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000000" flood-opacity=".16" />
      </filter>
    </defs>

    <rect width="1200" height="1200" fill="url(#bg)" />
    <circle cx="900" cy="180" r="220" fill="url(#glow)" />
    <text x="90" y="110" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#6f8f67">REVESTEIX</text>
    <text x="90" y="170" font-family="Arial,sans-serif" font-size="60" font-weight="800" fill="#111111">Dessuadora Urban Black</text>
  </svg>
</body>
</html>
